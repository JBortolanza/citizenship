services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/srv/frontend/dist
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: fastapi_backend
    restart: always
    volumes:
      - ./backend:/code
    environment:
      - DATABASE_URL=${DATABASE_URL}
volumes:
  caddy_data:
  caddy_config: